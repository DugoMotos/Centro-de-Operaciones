<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Dugomotos — Operaciones</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff;--sf:#F8F8F6;--bd:#E8E6DF;--bd2:#D3D1C7;--tx:#2C2C2A;--tm:#888780;--tl:#B4B2A9;--gn:#1D9E75;--gnl:#E1F5EE;--gnd:#085041;--bl:#378ADD;--bll:#E6F1FB;--bld:#0C447C;--or:#D85A30;--orl:#FAECE7;--rd:#E24B4A;--rdl:#FCEBEB;--rdd:#A32D2D;--pr:#7F77DD;--prl:#EEEDFE;--yl:#FBBF24;--yll:#FAEEDA;--yld:#633806;--vl:#27500A;--vll:#EAF3DE;--vlb:#97C459;--cy:#22D3EE;--r:10px;--ff:'DM Sans',system-ui,sans-serif;--fm:'DM Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--ff);background:#F5F4F0;color:var(--tx);min-height:100dvh;-webkit-font-smoothing:antialiased}
.app{max-width:680px;margin:0 auto;background:var(--bg);min-height:100dvh;border-left:1px solid var(--bd);border-right:1px solid var(--bd)}
.pad{padding:16px 18px}
@media(min-width:768px){
.app{max-width:800px}
.pad{padding:24px 32px}
.hdr{padding:24px 32px 14px}
.main-tabs{font-size:15px}
.main-tab{padding:14px 12px;font-size:15px}
.step-body{padding:14px 16px!important}
.step-t{font-size:15px}
.card{padding:16px 20px}
.stat-grid{grid-template-columns:repeat(3,1fr)}
.prefix-grid{grid-template-columns:repeat(4,1fr)}
}
@media(min-width:1024px){
.app{max-width:960px}
.pad{padding:28px 40px}
}
@media(max-width:380px){
.pad{padding:14px 12px}
.main-tab{font-size:12px;padding:10px 6px}
.inp{font-size:14px;letter-spacing:2px}
.btn{font-size:12px;padding:10px}
.step-t{font-size:12px}
}
.hdr{text-align:center;padding:16px 18px 10px}
.hdr h1{font-size:10px;font-weight:700;color:var(--rd);text-transform:uppercase;letter-spacing:2px}
.hdr h2{font-size:18px;font-weight:700;margin-top:2px}
.hdr p{font-size:11px;color:var(--tm);margin-top:2px}
.lbl{font-size:10px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--gnd);color:var(--gnl);padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}.toast.err{background:var(--rd);color:#fff}
.main-tabs{display:flex;border-bottom:2px solid var(--bd)}
.main-tab{flex:1;padding:12px 8px;border:none;background:transparent;font-family:var(--ff);font-size:13px;font-weight:700;color:var(--tm);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.main-tab.on{color:var(--gnd);border-bottom-color:var(--gn)}
.sub-tabs{display:flex;gap:3px;background:var(--sf);border-radius:10px;padding:3px;margin-bottom:14px;border:.5px solid var(--bd)}
.sub-tab{flex:1;padding:8px 4px;border:none;background:transparent;color:var(--tm);font-family:var(--ff);font-size:10px;font-weight:600;border-radius:7px;cursor:pointer}
.sub-tab.on{background:var(--bg);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.inp{width:100%;padding:11px 12px;border-radius:var(--r);border:1.5px solid var(--bd2);background:var(--sf);font-family:var(--fm);font-size:16px;font-weight:700;color:var(--tx);text-align:center;text-transform:uppercase;letter-spacing:3px;outline:none;box-sizing:border-box}
.inp:focus{border-color:var(--gn)}
.inp-sm{font-size:11px;padding:8px 10px;text-align:left;letter-spacing:0;font-family:var(--ff);font-weight:400;text-transform:none}
.btn{width:100%;padding:11px;border-radius:var(--r);font-family:var(--ff);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn:active{transform:scale(.98)}.btn-p{background:var(--gnd);color:var(--gnl)}.btn-o{background:transparent;border:1px solid var(--bd2);color:var(--tx)}.btn-d{background:transparent;border:1px solid var(--rd);color:var(--rd)}.btn-v{background:var(--vl);color:var(--vll)}.btn:disabled{opacity:.35;cursor:default}
.card{padding:12px 14px;border-radius:10px;background:var(--sf);margin-bottom:10px}
.flex{display:flex;gap:8px}.fxc{align-items:center}.fxb{justify-content:space-between}
.sel{width:100%;padding:11px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--sf);font-family:var(--ff);font-size:13px;color:var(--tx);outline:none;appearance:auto;box-sizing:border-box}
.act-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:var(--r);border:.5px solid var(--bd);cursor:pointer;margin-bottom:5px}
.act-row.on{border:1.5px solid var(--bl);background:rgba(55,138,221,.05)}
.done-row{display:flex;align-items:center;gap:10px;padding:7px 10px;background:#F7FBF2;border-radius:7px;border:.5px solid #C0DD97;margin-bottom:3px;opacity:.7}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-card{background:var(--sf);border:.5px solid var(--bd);border-radius:10px;padding:12px;text-align:center}
.stat-num{font-family:var(--fm);font-size:24px;font-weight:700}
.stat-lbl{font-size:9px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.hist-row{display:flex;gap:8px;padding:8px 10px;background:var(--sf);border-radius:7px;border:.5px solid var(--bd);margin-bottom:3px}
.conn{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600}
.conn-dot{width:7px;height:7px;border-radius:50%}
.prefix-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.prefix-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--tm)}
.prefix-letter{font-family:var(--fm);font-size:12px;font-weight:700;color:var(--tx);width:18px;height:18px;display:flex;align-items:center;justify-content:center;background:var(--sf);border-radius:3px}
.step{display:flex;align-items:stretch;transition:opacity .3s}
.step-line{display:flex;flex-direction:column;align-items:center;width:30px;flex-shrink:0}
.step-dot{border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .3s}
.step-bar{width:2px;flex:1}
.step-body{flex:1;margin-left:5px;margin-bottom:3px;padding:7px 10px;border-radius:var(--r);transition:all .3s}
.step-body.active{padding:12px}
.step-tag{font-size:8px;font-weight:600;padding:1px 5px;border-radius:4px;display:inline-block;margin-right:3px}
.step-t{margin:3px 0 0;font-size:13px;font-weight:600}
.alist-opt{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;border:.5px solid var(--bd);cursor:pointer;margin-bottom:3px}
.alist-opt.on{border:1.5px solid var(--gn);background:var(--gnl)}
.alist-chk{width:16px;height:16px;border-radius:3px;border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center}
.alist-opt.on .alist-chk{border-color:var(--gn);background:var(--gn)}
.recent-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:9px 12px;border-radius:var(--r);border:.5px solid var(--bd);background:var(--sf);cursor:pointer;margin-bottom:3px;text-align:left}
</style>
</head>
<body>
<div class="app">
<div id="stickyTop" style="position:sticky;top:0;z-index:10;background:var(--bg)">
<div class="hdr"><h1>Dugomotos</h1><h2>Centro de operaciones</h2><p id="dP"></p></div>
<div class="main-tabs">
<button class="main-tab on" id="mt2" onclick="setMain('proc')">📋 Procedimiento</button>
<button class="main-tab" id="mt1" onclick="setMain('alist')">⚙ Alistamientos</button>
<button class="main-tab" id="mt3" onclick="setMain('plan')">📊 Plan</button>
<button class="main-tab" id="mt4" onclick="setMain('config')">🔧</button>
</div>
<div class="pad" id="c"></div>
</div>
<div class="toast" id="toast"></div>

        var stepExpandKey=day.day+'_'+origIdx;

          if(hasDateReg)h+='<span class="step-tag" style="background:var(--bll);color:var(--bld)">Consignar fecha</span>';

        // Date registration (collapsible - only show content when this step is the active/focused one)
        if(hasDateReg){
          var bdNames={tram:'BD Trámites',plan:'BD Plan alistamientos',caja:'BD Caja',cont:'BD Contabilidad'};

        }

        var isPlaca=step.tp==='placa';

        if(isPlaca&&!placaDone){
          h+='<div style="margin-top:8px;padding:8px 10px;border-radius:6px;background:var(--vll);border:.5px solid var(--vlb)">';

        h+='</div></div>';

  h+='<button class="btn btn-o" style="margin-top:10px" onclick="pActive=null;pMode=\'\';pAlistSel=[];render()">← Volver al menú</button>';

function pBuscar(){
  var inp=document.getElementById('pIn');
  var code=(inp?inp.value:'').trim().toUpperCase();
  if(!code){toast('Ingresa código',1);return}
  if(!pMotos[code]){
    pMotos[code]={created:new Date().toISOString(),steps:{},alist:[],remote:{},checks:{},info:{}};
  }
  pMotos[code].checks=pMotos[code].checks||{};
  pMotos[code].steps=pMotos[code].steps||{};
  pMotos[code].info=pMotos[code].info||{};
  sv(SK_P,pMotos);
  pAlistSel=[];
  pExpandStep=null;
  pFocusReg=null;

  if(pCfg.tramC){
    // Show loading in menu area
    pLoading=true;pActive=null;render();
    var ctrl=new AbortController();
    var to=setTimeout(function(){ctrl.abort()},12000);
    fetch(pCfg.tramC,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({codigoBarras:code}),signal:ctrl.signal
    }).then(function(r){clearTimeout(to);return r.json()}).then(function(data){
      var rows=data.value||data;
      if(rows&&rows.length>0){
        var row=Array.isArray(rows)?rows[0]:rows;
        pMotos[code].info={
          marca:row.marca||row.MARCA||row.Marca||'',
          linea:row.linea||row.LINEA||row.Linea||'',
          referencia:row.referencia||row.REFERENCIA||row.Referencia||'',
          modelo:row.modelo||row.MODELO||row.Modelo||'',
          color:row.color||row.COLOR||row.Color||''
        };
        var colMap={
          'manifiesto':'s03','asig_placa':'s04a','cot_datapro':'s05',
          'solic_soat':'s06','soat_ok':'s07','matricula':'s08',
          'mat_ok':'s09','rec_placa':'s10','garantia':'s11'
        };
        for(var col in colMap){
          var val=row[col]||'';
          if(val&&val.toString().trim()!=='')pMotos[code].steps[colMap[col]]=val;
        }
        sv(SK_P,pMotos);
      }else{
        toast('Código no encontrado en BD Trámites',1);
      }
      pLoading=false;pActive=code;render();
    }).catch(function(e){
      clearTimeout(to);
      pLoading=false;pActive=code;
      toast(e.name==='AbortError'?'Tiempo agotado — modo local':'Sin conexión — modo local',1);
      render();
    });
  }else{
    pActive=code;render();
  }
}

function pReg(sid){
  var now=new Date();
  var fechaISO=now.toISOString();
  var fechaLocal=now.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'});

  // Save locally first (always)
  pMotos[pActive].steps[sid]=fechaISO;
  sv(SK_P,pMotos);

  var step=TRAM_STEPS.find(function(s){return s.id===sid});

  // If step has a BD and we have the write URL, send to SharePoint
  if(step&&step.bd==='tram'&&step.col&&pCfg.tramW){
    fetch(pCfg.tramW,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        codigoBarras:pActive,
        columna:step.col,
        valor:fechaLocal
      })
    }).then(function(r){return r.json()}).then(function(){
      pMotos[pActive].remote[sid]=fechaLocal;
      sv(SK_P,pMotos);
      toast('✓ '+step.t+' — guardado en SharePoint');
    }).catch(function(){
      toast('✓ '+step.t+' — guardado local (sincronizar después)',1);
    });
  }else{
    toast('✓ '+step.t);
  }
  render();
}

function pCheckStep(dayNum,stepIdx){
  var md=pMotos[pActive];if(!md.checks)md.checks={};
  var key=dayNum+'_'+stepIdx;
  // Already checked = permanent, no undo
  if(md.checks[key])return;
  // Find all steps for this day and area to enforce sequential
  var day=DAYS.find(function(d){return d.day===dayNum});
  if(!day)return;
  var areaSteps=pUserArea?day.steps.filter(function(s){return s.c===pUserArea}):day.steps;
  // Check that all previous steps in this day are completed
  for(var i=0;i<areaSteps.length;i++){
    var oi=day.steps.indexOf(areaSteps[i]);
    var pk=dayNum+'_'+oi;
    if(oi===stepIdx)break;
    if(!md.checks[pk]){toast('Completa el paso anterior primero',1);return}
  }
  md.checks[key]=new Date().toISOString();
  sv(SK_P,pMotos);render();
}

    h+='</div>';
    h+='<div style="text-align:right;flex-shrink:0">';
    if(r.fecha)h+='<div style="font-size:9px;color:var(--tm)">'+(r.fecha||'')+'</div>';
    if(r.placa)h+='<div style="font-size:9px;font-family:var(--fm);color:var(--tx);margin-top:2px">'+(r.placa||'')+'</div>';
    h+='</div></div></div>';
  });

  if(filtered.length>50)h+='<div style="text-align:center;padding:10px;font-size:11px;color:var(--tm)">Mostrando 50 de '+filtered.length+'. Usá los filtros para reducir.</div>';

  return h;
}

function planSync(){
  if(!pCfg.planC){toast('URL de consulta no configurada',1);return}
  planLoading=true;render();
  var ctrl=new AbortController();
  var to=setTimeout(function(){ctrl.abort()},15000);
  fetch(pCfg.planC,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({codigoBarras:'*'}),signal:ctrl.signal
  }).then(function(r){clearTimeout(to);return r.json()}).then(function(data){
    planData=data.value||data;
    if(!Array.isArray(planData))planData=[];
    planLoading=false;
    toast('✓ '+planData.length+' registros cargados');
    render();
  }).catch(function(e){
    clearTimeout(to);planLoading=false;
    toast('Error al cargar datos',1);render();
  });
}

try{render()}catch(e){
  document.getElementById('c').innerHTML='<div style="text-align:center;padding:40px"><div style="font-size:28px;margin-bottom:10px">⚠️</div><div style="font-size:14px;font-weight:600;margin-bottom:8px">Error al cargar</div><div style="font-size:12px;color:var(--tm);margin-bottom:16px">'+e.message+'</div><button class="btn btn-d" style="max-width:240px;margin:0 auto" onclick="localStorage.removeItem(\'dugo-p-v2\');localStorage.removeItem(\'dugo-a-v4\');location.reload()">Reiniciar datos y recargar</button></div>';
}
</script>
</body>
</html>
