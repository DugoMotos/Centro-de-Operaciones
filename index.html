<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Dugomotos — Operaciones</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0A;--sf:rgba(255,255,255,0.02);--sf2:rgba(255,255,255,0.04);--bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.12);--tx:#E8E8E8;--tm:#888;--tl:#555;--gn:#1D9E75;--gnl:rgba(29,158,117,0.15);--gnd:#5DCAA5;--bl:#378ADD;--bll:rgba(55,138,221,0.15);--bld:#85B7EB;--or:#D85A30;--orl:rgba(216,90,48,0.15);--rd:#E24B4A;--rdl:rgba(226,75,74,0.1);--rdd:#F09595;--pr:#7F77DD;--prl:rgba(127,119,221,0.15);--yl:#EF9F27;--yll:rgba(186,117,23,0.15);--yld:#EF9F27;--vl:#27500A;--vll:rgba(99,153,34,0.18);--vlb:#97C459;--cy:#22D3EE;--r:8px;--ff:'DM Sans',system-ui,sans-serif;--fm:'DM Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--ff);background:#000;color:var(--tx);min-height:100dvh;-webkit-font-smoothing:antialiased}
.app{max-width:100%;width:100%;margin:0;background:var(--bg);min-height:100dvh;display:grid;grid-template-columns:230px 1fr;border:none}
@media(min-width:1600px){.main{padding:32px 48px}}
/* MOBILE */
.mobile-bar{display:none}
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;top:0;left:-260px;width:260px;height:100dvh;z-index:100;transition:left 0.25s ease;box-shadow:8px 0 24px rgba(0,0,0,0.5);overflow-y:auto}
  .side.open{left:0}
  .side-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99}
  .side-overlay.show{display:block}
  .mobile-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.5px solid var(--bd);background:var(--bg);position:sticky;top:0;z-index:50}
  .mobile-burger{width:36px;height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:rgba(255,255,255,0.04);border:0.5px solid var(--bd2);border-radius:6px;cursor:pointer;flex-shrink:0}
  .mobile-burger span{width:18px;height:2px;background:#ddd;border-radius:1px}
  .mobile-title{flex:1;display:flex;align-items:center;gap:10px}
  .mobile-title-logo{width:24px;height:24px;background:var(--rd);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:white;letter-spacing:0.5px}
  .mobile-title-name{font-size:13px;font-weight:500;letter-spacing:1px}
  .main{padding:18px 16px}
  .neg-cols{grid-template-columns:70px 1.2fr 80px 1fr 1fr 50px;gap:8px}
  .neg-table-bar{padding:10px 14px}
  .neg-table-bar input{width:100%!important;max-width:none!important}
  .neg-filters{flex-direction:column;align-items:stretch;gap:10px}
  .neg-filter-block,.neg-select{width:100%;min-width:0}
  .neg-cell{font-size:12px}
  .neg-mark{font-size:8px;padding:2px 5px}
  .h1{font-size:22px}
}
@media(max-width:480px){
  .neg-cols{grid-template-columns:60px 1.2fr 60px 1fr 60px 40px;gap:6px}
  .neg-table-head>div:nth-child(5){display:none}
  .neg-cols>div:nth-child(5){display:none}
  .main{padding:14px 12px}
}

/* SIDEBAR */
.side{background:var(--bg);border-right:0.5px solid var(--bd);padding:20px 0;overflow-y:auto;min-height:100dvh}
.side-brand{display:flex;align-items:center;gap:10px;padding:0 18px 18px;border-bottom:0.5px solid var(--bd);margin-bottom:14px}
.side-logo{width:26px;height:26px;background:var(--rd);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:white;letter-spacing:0.5px}
.side-name{font-size:13px;font-weight:500;letter-spacing:1px}
.side-sub{font-size:10px;color:#666;letter-spacing:0.5px;margin-left:auto}
.side-group{padding:14px 0 6px}
.side-group-title{font-size:9px;color:var(--tl);letter-spacing:2px;padding:0 18px 8px;text-transform:uppercase}
.side-link{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13px;color:#aaa;cursor:pointer;border-left:2px solid transparent;transition:all 0.15s;user-select:none}
.side-link:hover{background:rgba(255,255,255,0.03);color:#ddd}
.side-link.on{background:rgba(226,75,74,0.08);color:white;border-left-color:var(--rd);font-weight:500}
.side-link svg{flex-shrink:0;opacity:0.7}
.side-link.on svg{opacity:1}
.side-chevron{margin-left:auto;font-size:10px;color:#666;transition:transform 0.2s}
.side-link.parent.expanded .side-chevron{transform:rotate(90deg);color:#aaa}
.side-badge{margin-left:auto;font-size:10px;background:var(--rd);color:white;padding:1px 8px;border-radius:10px;font-weight:500;font-family:var(--fm)}
.side-link.parent.expanded .side-badge{margin-left:0;margin-right:8px}
.side-sub{max-height:0;overflow:hidden;transition:max-height 0.25s ease}
.side-sub.open{max-height:240px}
.sublink{display:flex;align-items:center;gap:10px;padding:8px 18px 8px 44px;font-size:12px;color:#888;cursor:pointer;border-left:2px solid transparent;transition:all 0.15s;user-select:none}
.sublink:hover{background:rgba(255,255,255,0.03);color:#ccc}
.sublink.on{background:rgba(226,75,74,0.06);color:var(--rdd);border-left-color:#A32D2D;font-weight:500}
.sublink svg{opacity:0.6}
.sublink.on svg{opacity:1}

/* MAIN */
.main{padding:28px 32px;overflow-x:hidden}
@media(max-width:768px){.main{padding:18px 16px}}
.eyebrow{font-size:9px;color:#888;letter-spacing:2.5px;font-weight:500;margin-bottom:6px;text-transform:uppercase}
.h1{font-size:26px;font-weight:500;line-height:1;margin-bottom:6px}
.sub-title{font-size:13px;color:#888;margin-bottom:22px}

/* COMPATIBILIDAD CON CLASES EXISTENTES */
.pad{padding:0}
.lbl{font-size:10px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;display:block}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--gn);color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}.toast.err{background:var(--rd);color:#fff}

.sub-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.sub-tab{padding:8px 16px;border:0.5px solid var(--bd2);border-radius:6px;background:var(--sf2);font-family:var(--ff);font-size:12px;color:#aaa;cursor:pointer;transition:all 0.15s}
.sub-tab:hover{color:#ccc}
.sub-tab.on{background:rgba(226,75,74,0.1);color:var(--rdd);border-color:#A32D2D;font-weight:500}

.inp{width:100%;padding:12px 14px;border-radius:var(--r);border:0.5px solid var(--bd2);background:var(--sf2);font-family:var(--fm);font-size:14px;font-weight:500;color:var(--tx);text-align:center;text-transform:uppercase;letter-spacing:1.5px;outline:none;box-sizing:border-box}
.inp:focus{border-color:var(--rd)}
.inp-sm{font-size:11px;padding:8px 12px;text-align:left;letter-spacing:0;font-family:var(--ff);font-weight:400;text-transform:none;color:#ccc}
.inp-sm::placeholder{color:#666}

.btn{width:100%;padding:11px;border-radius:var(--r);font-family:var(--ff);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn:active{transform:scale(.98)}
.btn-p{background:var(--rd);color:white}
.btn-p:hover{background:#D03B3A}
.btn-o{background:var(--sf2);border:0.5px solid var(--bd2);color:#ccc}
.btn-o:hover{background:rgba(255,255,255,0.07);color:#fff}
.btn-d{background:transparent;border:0.5px solid var(--rd);color:var(--rd)}
.btn-v{background:var(--gn);color:#fff}
.btn:disabled{opacity:.35;cursor:default}

.card{padding:14px 16px;border-radius:var(--r);background:var(--sf);border:0.5px solid var(--bd);margin-bottom:10px}
.flex{display:flex;gap:8px}.fxc{align-items:center}.fxb{justify-content:space-between}

.sel{width:100%;padding:11px 14px;border-radius:var(--r);border:0.5px solid var(--bd2);background:var(--sf2);font-family:var(--ff);font-size:13px;color:var(--tx);outline:none;box-sizing:border-box}

.act-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:var(--r);border:0.5px solid var(--bd);cursor:pointer;margin-bottom:5px;background:var(--sf)}
.act-row.on{border:1px solid var(--bl);background:var(--bll)}
.done-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(99,153,34,0.06);border-radius:7px;border:0.5px solid rgba(99,153,34,0.3);margin-bottom:3px}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:768px){.stat-grid{grid-template-columns:1fr 1fr}}
.stat-card{background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center}
.stat-num{font-family:var(--fm);font-size:26px;font-weight:500}
.stat-lbl{font-size:9px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:4px}

.hist-row{display:flex;gap:10px;padding:10px 12px;background:var(--sf);border-radius:7px;border:0.5px solid var(--bd);margin-bottom:4px}

.conn{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:500}
.conn-dot{width:7px;height:7px;border-radius:50%}

.prefix-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px;background:var(--sf);border:0.5px solid var(--bd);border-radius:var(--r);margin-top:14px}
@media(max-width:768px){.prefix-grid{grid-template-columns:repeat(2,1fr)}}
.prefix-item{display:flex;align-items:center;gap:8px;font-size:11px;color:#aaa}
.prefix-letter{font-family:var(--fm);font-size:12px;font-weight:500;color:white;background:rgba(255,255,255,0.08);padding:3px 9px;border-radius:4px}

/* STEPS (procedimiento por día) */
.step{display:flex;align-items:stretch;transition:opacity .3s}
.step-line{display:flex;flex-direction:column;align-items:center;width:30px;flex-shrink:0}
.step-dot{border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .3s}
.step-bar{width:2px;flex:1}
.step-body{flex:1;margin-left:5px;margin-bottom:6px;padding:10px 12px;border-radius:var(--r);transition:all .3s;background:var(--sf);border:0.5px solid var(--bd)}
.step-body.active{padding:14px}
.step-tag{font-size:9px;font-weight:500;padding:2px 7px;border-radius:4px;display:inline-block;margin-right:3px;text-transform:uppercase;letter-spacing:0.5px}
.step-t{margin:3px 0 0;font-size:13px;font-weight:500}

.alist-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:7px;border:0.5px solid var(--bd);cursor:pointer;margin-bottom:4px;background:var(--sf)}
.alist-opt.on{border:1px solid var(--gn);background:var(--gnl)}
.alist-chk{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center}
.alist-opt.on .alist-chk{border-color:var(--gn);background:var(--gn)}

.recent-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:10px 14px;border-radius:var(--r);border:0.5px solid var(--bd);background:var(--sf);cursor:pointer;margin-bottom:4px;text-align:left;color:#ccc}
.recent-btn:hover{border-color:var(--bd2);background:var(--sf2)}

.empty{text-align:center;padding:60px 20px;color:#555;font-size:13px}

/* INPUTS DARK */
input[type="date"].inp-sm,input[type="text"].inp-sm,select.inp-sm{color-scheme:dark}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7)}

/* SCROLLBAR */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}
/* NEGOCIOS */
.neg-filters{display:flex;align-items:flex-end;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.neg-filter-block{display:flex;flex-direction:column}
.neg-select-label{font-size:9px;color:#666;letter-spacing:1.2px;text-transform:uppercase;display:block;margin-bottom:5px}
.neg-select{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.12);color:#ddd;padding:9px 32px 9px 14px;font-size:12px;font-family:var(--ff);border-radius:6px;outline:none;cursor:pointer;min-width:200px;appearance:none;background-image:url("data:image/svg+xml;charset=US-ASCII,%3Csvg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'%3E%3Cpath fill='%23888' d='M0 0l4 5 4-5z'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;background-size:8px}
.neg-select:focus{border-color:var(--rd)}

.neg-table{border:0.5px solid var(--bd);border-radius:8px;overflow:hidden;margin-top:14px}
.neg-table-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:0.5px solid var(--bd);background:rgba(255,255,255,0.015);gap:10px;flex-wrap:wrap}
.neg-table-count{font-size:10px;color:#888;letter-spacing:1.5px}
.neg-cols{display:grid;grid-template-columns:90px 1.4fr 110px 1.4fr 1.4fr 90px;gap:18px;align-items:center}
@media(max-width:900px){.neg-cols{grid-template-columns:80px 1.3fr 90px 1.3fr 1.2fr 70px;gap:10px}}
.neg-table-head{padding:11px 18px;font-size:9px;color:#777;letter-spacing:1.5px;border-bottom:0.5px solid var(--bd)}
.neg-th{cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px;transition:color 0.15s}
.neg-th:hover{color:#ccc}
.neg-th.active{color:var(--rdd)}
.neg-th-arrow{font-size:8px;line-height:1;display:inline-flex;flex-direction:column;color:#444;margin-left:2px}
.neg-th-arrow span{line-height:0.8}
.neg-th-arrow .up.on,.neg-th-arrow .dn.on{color:var(--rdd)}
.neg-th.right{justify-content:flex-end}
.neg-row{padding:13px 18px;border-bottom:0.5px solid rgba(255,255,255,0.04);cursor:pointer;transition:background 0.1s}
.neg-row:last-child{border-bottom:none}
.neg-row:hover{background:rgba(226,75,74,0.04)}
.neg-code{font-family:var(--fm);font-size:13px;color:var(--rd);font-weight:500}
.neg-cell{font-size:13px}
.neg-mark{font-size:9px;font-weight:500;padding:3px 7px;border-radius:3px;display:inline-block;margin-top:3px}
.neg-mark.hero{background:var(--gnl);color:var(--gnd)}
.neg-mark.sym{background:var(--orl);color:#F0997B}
.neg-mark.otra{background:rgba(255,255,255,0.06);color:#aaa}
.neg-fecha{font-family:var(--fm);font-size:11px;color:#888}
.neg-tag{display:inline-block;padding:4px 10px;border-radius:4px;font-size:11px;border:0.5px solid;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.neg-tag-warn{background:var(--yll);color:var(--yld);border-color:#BA7517}
.neg-tag-purple{background:var(--prl);color:#AFA9EC;border-color:#534AB7}
.neg-tag-red{background:var(--rdl);color:var(--rdd);border-color:#A32D2D}
.neg-tag-green{background:var(--vll);color:var(--vlb);border-color:#639922}
.neg-tag-blue{background:var(--bll);color:var(--bld);border-color:#378ADD}
.neg-tag-empty{background:rgba(255,255,255,0.04);color:#666;border-color:rgba(255,255,255,0.1)}
.neg-progress{display:flex;align-items:center;gap:10px}
.neg-progress-bar{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.neg-progress-fill{height:100%;border-radius:3px;transition:width 0.4s}
.neg-progress-pct{font-size:11px;font-family:var(--fm);min-width:36px;text-align:right;font-weight:500}
.neg-days-warn{color:var(--yl);font-weight:500}
.neg-days-danger{color:var(--rd);font-weight:500}
.neg-comment-icon{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;cursor:pointer;background:var(--yll);border:0.5px solid #BA7517;color:var(--yl);flex-shrink:0;margin-left:8px;position:relative}
.neg-comment-icon:hover{background:rgba(186,117,23,0.3)}
.neg-comment-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--rd);border-radius:50%;border:1.5px solid var(--bg)}
.neg-comment-spacer{display:inline-block;width:32px}
/* Ajustes finos modo dark */
.hist-row{color:#ccc}
.act-row{color:#ddd}
.act-row.on{background:rgba(55,138,221,0.08);border-color:var(--bl)}
.done-row{color:#bbb}
.recent-btn{transition:all 0.15s}
.recent-btn:hover{transform:translateX(2px);border-color:var(--bd2)}

.stat-card{transition:transform 0.15s;color:#ddd}
.stat-card:hover{transform:translateY(-2px);border-color:var(--bd2)}

select option{background:#1a1a1a;color:#ddd}

.step-body{color:#ddd}

.toast{box-shadow:0 4px 16px rgba(0,0,0,0.4)}

/* Sticky header transparente sobre fondo dark */
[id="stickyTop"]{background:var(--bg)!important}
</style>
</head>
<body>
<div class="side-overlay" id="sideOverlay" onclick="toggleSide()"></div>
<div class="app">
<div class="mobile-bar">
  <button class="mobile-burger" onclick="toggleSide()" aria-label="Menú"><span></span><span></span><span></span></button>
  <div class="mobile-title">
    <div class="mobile-title-logo">DM</div>
    <div class="mobile-title-name">DUGOMOTOS</div>
  </div>
</div>
<aside class="side" id="sideMenu">
  <div class="side-brand">
    <div class="side-logo">DM</div>
    <div class="side-name">DUGOMOTOS</div>
    <div class="side-sub">Intranet</div>
  </div>

  <div class="side-group">
    <div class="side-group-title">Operación</div>
    <div class="side-link" data-sec="negocios" onclick="setMain('negocios')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      Negocios
    </div>
    <div class="side-link parent expanded on" id="parentProc" onclick="toggleProcParent()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
      Procedimiento
      <span class="side-chevron">▸</span>
    </div>
    <div class="side-sub open" id="subProc">
      <div class="sublink on" data-sec="proc" onclick="event.stopPropagation();setMain('proc')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>
        Trámites
      </div>
      <div class="sublink" data-sec="alist" onclick="event.stopPropagation();setMain('alist')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>
        Servicio Técnico
      </div>
      <div class="sublink" data-sec="plan" onclick="event.stopPropagation();setMain('plan')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>
        Plan
      </div>
    </div>
  </div>

  <div class="side-group">

function setMain(m){
  main=m;

    if(p){p.classList.add('on','expanded')}

    if(sp)sp.classList.add('open');
    var sl=document.querySelector('.sublink[data-sec="'+m+'"]');
    if(sl)sl.classList.add('on');
  } else {
    var l=document.querySelector('.side-link[data-sec="'+m+'"]');
    if(l)l.classList.add('on');
  }
  if(window.innerWidth<=768){
    var s=document.getElementById('sideMenu');
    var o=document.getElementById('sideOverlay');
    if(s)s.classList.remove('open');
    if(o)o.classList.remove('show');
  }
  render();
}

function negNormTipo(t){
  if(!t)return'';
  var s=String(t).toLowerCase();
  if(s.indexOf('subdistr')>=0)return'ns';
  if(s.indexOf('distrib')>=0)return'nd';
  if(s.indexOf('usad')>=0)return'us';
  return'';
}

// Normaliza marca
function negNormMarca(m){
  if(!m)return'OTRA';
  var s=String(m).toUpperCase().trim();
  if(s.indexOf('HERO')>=0)return'HERO';
  if(s.indexOf('SYM')>=0)return'SYM';
  return'OTRA';
}

// Parsea fechas en cualquier formato común: DD/MM/YYYY, ISO, número serial Excel, Date object
function negParseFecha(v){
  if(!v)return null;
  // Si ya es Date
  if(v instanceof Date)return isNaN(v.getTime())?null:v;
  var s=String(v).trim();
  if(!s||s==='—'||s.toLowerCase()==='na')return null;

  // Formato DD/MM/YYYY o DD/MM/YY
  var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(m){
    var dia=parseInt(m[1],10);
    var mes=parseInt(m[2],10)-1;
    var anio=parseInt(m[3],10);
    if(anio<100)anio+=2000;
    var d=new Date(anio,mes,dia);
    return isNaN(d.getTime())?null:d;
  }

  // Número serial de Excel (días desde 1900-01-01)
  if(/^\d+(\.\d+)?$/.test(s)){
    var n=parseFloat(s);
    if(n>25569&&n<60000){ // entre 1970 y ~2064
      var d=new Date((n-25569)*86400000);
      return isNaN(d.getTime())?null:d;
    }
  }

  // Formato ISO o cualquiera que JS reconozca
  var d=new Date(s);
  return isNaN(d.getTime())?null:d;
}

// Días desde fecha_venta hasta hoy
function negDiasDesde(fechaRaw){
  var d=negParseFecha(fechaRaw);
  if(!d)return 0;
  var ms=Date.now()-d.getTime();
  return Math.max(0,Math.floor(ms/86400000));
}

// Formato DD/MM/AA para mostrar
function negFmtFecha(v){
  var d=negParseFecha(v);
  if(!d)return'—';
  return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+String(d.getFullYear()).slice(-2);
}

function pBuscar(){
  var inp=document.getElementById('pIn');
  var code=(inp?inp.value:'').trim().toUpperCase();
  if(!code){toast('Ingresa código',1);return}

  if(!pCfg.tramC){
    toast('No hay conexión configurada',1);
    return;
  }

  pLoading=true;pActive=null;render();
  var ctrl=new AbortController();
  var to=setTimeout(function(){ctrl.abort()},12000);
  fetch(pCfg.tramC,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({codigoBarras:code}),signal:ctrl.signal
  }).then(function(r){clearTimeout(to);return r.json()}).then(function(data){
    var rows=data.value||data;
    var row=null;
    if(Array.isArray(rows)&&rows.length>0)row=rows[0];
    else if(rows&&!Array.isArray(rows)&&Object.keys(rows).length>0)row=rows;

    if(!row){
      pLoading=false;pActive=null;render();
      alert('La motocicleta '+code+' no se encuentra registrada en BD Trámites.\n\nPosibles causas:\n• No está en proceso de venta\n• Ya fue entregada al cliente\n• El código fue digitado incorrectamente');
      return;
    }

    if(!pMotos[code]){
      pMotos[code]={created:new Date().toISOString(),steps:{},alist:[],remote:{},checks:{},info:{}};
    }
    pMotos[code].checks=pMotos[code].checks||{};
    pMotos[code].steps=pMotos[code].steps||{};
    pMotos[code].info={
      marca:row.marca||row.MARCA||row.Marca||'',
      linea:row.linea||row.LINEA||row.Linea||'',
      referencia:row.referencia||row.REFERENCIA||row.Referencia||'',
      modelo:row.modelo||row.MODELO||row.Modelo||'',
      color:row.color||row.COLOR||row.Color||''
    };
    var colMap={
      'manifiesto':'s03','asig_placa':'s04a','cot_datapro':'s05',
      'solic_soat':'s06','soat_ok':'s07','matricula':'s08',
      'mat_ok':'s09','rec_placa':'s10','garantia':'s11'
    };
    for(var col in colMap){
      var val=row[col]||'';
      if(val&&val.toString().trim()!=='')pMotos[code].steps[colMap[col]]=val;
    }
    sv(SK_P,pMotos);
    pAlistSel=[];pExpandStep=null;pFocusReg=null;
    pLoading=false;pActive=code;render();
  }).catch(function(e){
    clearTimeout(to);
    pLoading=false;pActive=null;render();
    alert(e.name==='AbortError'?'Tiempo agotado al consultar la moto. Verifica conexión.':'Error al consultar la moto: '+e.message);
  });
}

function pReg(sid){
  var now=new Date();
  var fechaISO=now.toISOString();
  // Formato ISO YYYY-MM-DD para enviar (sin ambigüedad)
  var fechaSinAmbig=now.getFullYear()+'-'+('0'+(now.getMonth()+1)).slice(-2)+'-'+('0'+now.getDate()).slice(-2);

  pMotos[pActive].steps[sid]=fechaISO;
  sv(SK_P,pMotos);

  var step=TRAM_STEPS.find(function(s){return s.id===sid});

  if(step&&step.bd==='tram'&&step.col&&pCfg.tramW){
    fetch(pCfg.tramW,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        codigoBarras:pActive,
        columna:step.col,
        valor:fechaSinAmbig
      })
    }).then(function(r){return r.json()}).then(function(){
      pMotos[pActive].remote[sid]=fechaSinAmbig;
      sv(SK_P,pMotos);
      toast('✓ '+step.t+' — guardado en SharePoint');
    }).catch(function(){
      toast('✓ '+step.t+' — guardado local (sincronizar después)',1);
    });
  }else{
    toast('✓ '+step.t);
  }
  render();
}

function pCheckStep(dayNum,stepIdx){
  var md=pMotos[pActive];if(!md.checks)md.checks={};
  var key=dayNum+'_'+stepIdx;
  if(md.checks[key])return;
  var day=DAYS.find(function(d){return d.day===dayNum});
  if(!day)return;
  var areaSteps=pUserArea?day.steps.filter(function(s){return s.c===pUserArea}):day.steps;
  for(var i=0;i<areaSteps.length;i++){
    var oi=day.steps.indexOf(areaSteps[i]);
    var pk=dayNum+'_'+oi;
    if(oi===stepIdx)break;
    if(!md.checks[pk]){toast('Completa el paso anterior primero',1);return}
  }
  md.checks[key]=new Date().toISOString();
  sv(SK_P,pMotos);render();

  // Enviar a Lista SharePoint
  var step=day.steps[stepIdx];
  var actNum=pGetActNum(step.t);
  var urlEscr=getUrl('tramEscrAct');
  if(actNum&&urlEscr){
    var now=new Date();
    var fechaISO=now.getFullYear()+'-'+('0'+(now.getMonth()+1)).slice(-2)+'-'+('0'+now.getDate()).slice(-2);
    fetch(urlEscr,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        codigo_barras:pActive,
        actividad_num:actNum,
        actividad:step.t,
        dia:'Día '+dayNum,
        estado:'Ejecutada',
        responsable:pUserArea?(AREAS[pUserArea]?AREAS[pUserArea].l:''):'',
        fecha_registro:fechaISO,
        comentario:''
      })
    }).then(function(r){return r.json()}).then(function(){
      // ok silencioso
    }).catch(function(){
      // falló silencioso, sigue funcionando local
    });
  }
}

function cfgCheckPin(){
  var v=cfgPinInput.trim();
  if(!v||v.length<4){toast('PIN mínimo 4 dígitos',1);return}
  if(!adminPin){adminPin=v;sv('dugo-admin-pin',adminPin);cfgAdmin=true;cfgPinInput='';toast('✓ PIN creado');render();return}
  if(v===adminPin){cfgAdmin=true;cfgPinInput='';toast('✓ Acceso concedido');render()}
  else{toast('PIN incorrecto',1);cfgPinInput='';render()}
}

function planSync(){
  if(!pCfg.planC){toast('URL de consulta no configurada',1);return}
  planLoading=true;render();
  var ctrl=new AbortController();
  var to=setTimeout(function(){ctrl.abort()},15000);
  fetch(pCfg.planC,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({codigoBarras:'*'}),signal:ctrl.signal
  }).then(function(r){clearTimeout(to);return r.json()}).then(function(data){
    planData=data.value||data;
    if(!Array.isArray(planData))planData=[];
    planLoading=false;
    toast('✓ '+planData.length+' registros cargados');
    render();
  }).catch(function(e){
    clearTimeout(to);planLoading=false;
    toast('Error al cargar datos',1);render();
  });
}

function renderAvance(){
  if(avLoading){
    return '<div style="text-align:center;padding:50px 20px"><div style="font-size:32px;margin-bottom:12px">📈</div><div style="font-size:15px;font-weight:700;margin-bottom:6px">Cargando avances...</div><div style="font-size:12px;color:var(--tm)">Consultando BD Trámites y Lista de actividades</div><div style="margin-top:16px"><div style="width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--gn);border-radius:50%;margin:0 auto;animation:spin 1s linear infinite"></div></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style></div>';
  }
  if(avSelectedCode){return renderAvanceDetalle(avSelectedCode)}
  if(!avMotos){
    return '<div style="text-align:center;padding:30px"><div style="font-size:32px;margin-bottom:12px">📈</div><div style="font-size:15px;font-weight:700;margin-bottom:8px">Avance del procedimiento</div><div style="font-size:12px;color:var(--tm);margin-bottom:20px">Lista de motocicletas Nueva Distribuidor en proceso</div><button class="btn btn-p" style="max-width:240px;margin:0 auto" onclick="avSync()">🔄 Cargar lista de motos</button>'+(avError?'<div style="margin-top:14px;padding:10px 14px;background:var(--rdl);border-radius:8px;border:.5px solid var(--rd);color:var(--rdd);font-size:11px">'+avError+'</div>':'')+'</div>';
  }

  // Build counts per moto
  var motosConAvance=avMotos.map(function(m){
    var code=m.codigo_barras||m.codigoBarras||'';
    var actividades=(avAvances||[]).filter(function(r){return(r.codigo_barras||r.Title||'')===code});
    var ejecutadas=actividades.filter(function(r){return(r.estado||'').toLowerCase()==='ejecutada'});
    var numsUnicos={};
    ejecutadas.forEach(function(r){numsUnicos[r.actividad_num||'']=true});
    var doneCount=Object.keys(numsUnicos).length;
    var pct=Math.round((doneCount/TOTAL_TRAM)*100);
    // Última actividad
    var sorted=ejecutadas.slice().sort(function(a,b){return(b.fecha_registro||'').localeCompare(a.fecha_registro||'')});
    var ultima=sorted[0]||null;
    return{moto:m,code:code,doneCount:doneCount,pct:pct,ultima:ultima,actividades:actividades}

  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">';
  h+='<input class="inp inp-sm" placeholder="Asesor..." value="'+avFilterAsesor+'" oninput="avFilterAsesor=this.value;render()">';
  h+='<select class="inp inp-sm" onchange="avFilterEstado=this.value;render()"><option value=""'+(avFilterEstado===''?' selected':'')+'>Todos los estados</option><option value="completo"'+(avFilterEstado==='completo'?' selected':'')+'>Completo (100%)</option><option value="enproceso"'+(avFilterEstado==='enproceso'?' selected':'')+'>En proceso</option><option value="sinIniciar"'+(avFilterEstado==='sinIniciar'?' selected':'')+'>Sin iniciar (0%)</option></select>';
  h+='</div>';
  if(avFilterCode||avFilterMarca||avFilterAsesor||avFilterEstado){
    h+='<button style="font-size:10px;color:var(--bl);background:none;border:none;cursor:pointer;text-decoration:underline;margin-bottom:10px" onclick="avFilterCode=\'\';avFilterMarca=\'\';avFilterAsesor=\'\';avFilterEstado=\'\';render()">Limpiar filtros</button>';
  }

  if(!filtered.length){
    h+='<div style="text-align:center;padding:24px;color:var(--tm);font-size:12px">Sin resultados con los filtros aplicados</div>';
    return h;
  }

  // List of motos
  filtered.forEach(function(x){
    var m=x.moto;var pct=x.pct;
    var pctColor=pct===100?'var(--gn)':pct>=75?'#5BA12C':pct>=50?'var(--or)':pct>=25?'var(--yl)':'var(--rd)';
    var marca=(m.marca||'').toString().toUpperCase();
    var marcaBg=marca==='HERO'?'var(--gnl)':marca==='SYM'?'var(--orl)':'var(--sf)';
    var marcaColor=marca==='HERO'?'var(--gnd)':marca==='SYM'?'#712B13':'var(--tm)';
    var ultimaTxt=x.ultima?'Act. '+x.ultima.actividad_num+' · '+(x.ultima.responsable||''):'Sin actividades';
    var areaTxt=x.ultima?(x.ultima.responsable||'—'):'—';

    h+='<div class="card" style="padding:12px 14px;cursor:pointer;margin-bottom:6px" onclick="avSelectedCode=\''+x.code+'\';render()">';
    h+='<div class="flex fxc fxb" style="margin-bottom:8px">';
    h+='<div style="flex:1;min-width:0">';
    h+='<div class="flex fxc" style="gap:8px;margin-bottom:2px"><span style="font-family:var(--fm);font-size:14px;font-weight:700">'+x.code+'</span><span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:'+marcaBg+';color:'+marcaColor+'">'+marca+'</span></div>';
    h+='<div style="font-size:12px;font-weight:600">'+(m.linea||'')+' '+(m.referencia||'')+'</div>';
    if(m.cliente)h+='<div style="font-size:10px;color:var(--tm);margin-top:1px">'+(m.cliente||'')+(m.asesor?' · '+m.asesor:'')+'</div>';
    h+='</div>';
    h+='<div style="text-align:right;flex-shrink:0">';
    h+='<div style="font-size:18px;font-weight:800;color:'+pctColor+'">'+pct+'%</div>';
    h+='<div style="font-size:9px;color:var(--tm)">'+x.doneCount+'/'+TOTAL_TRAM+'</div>';
    h+='</div>';
    h+='</div>';
    // Progress bar
    h+='<div style="height:6px;background:var(--sf);border-radius:3px;overflow:hidden;margin-bottom:6px"><div style="height:100%;width:'+pct+'%;background:'+pctColor+';border-radius:3px;transition:width .3s"></div></div>';
    // Última actividad
    h+='<div style="display:flex;align-items:center;justify-content:space-between;font-size:10px"><span style="color:var(--tm)">Última: <strong style="color:var(--tx)">'+ultimaTxt+'</strong></span>';
    if(x.ultima&&x.ultima.fecha_registro)h+='<span style="font-family:var(--fm);color:var(--tm)">'+(x.ultima.fecha_registro||'')+'</span>';
    h+='</div>';
    h+='</div>';
  });

  return h;
}

function renderAvanceDetalle(code){
  var motoData=(avMotos||[]).find(function(m){return(m.codigo_barras||m.codigoBarras)===code});
  if(!motoData)return'<div style="padding:20px"><button class="btn btn-o" onclick="avSelectedCode=null;render()">← Volver</button><div style="text-align:center;margin-top:20px;color:var(--tm)">Moto no encontrada</div></div>';
  var actividades=(avAvances||[]).filter(function(r){return(r.codigo_barras||r.Title||'')===code});
  var ejecutadas={};
  actividades.forEach(function(r){if((r.estado||'').toLowerCase()==='ejecutada')ejecutadas[r.actividad_num||'']=r});

  var doneCount=Object.keys(ejecutadas).length;
  var pct=Math.round((doneCount/TOTAL_TRAM)*100);
  var pctColor=pct===100?'var(--gn)':pct>=75?'#5BA12C':pct>=50?'var(--or)':pct>=25?'var(--yl)':'var(--rd)';
  var marca=(motoData.marca||'').toString().toUpperCase();
  var marcaBg=marca==='HERO'?'linear-gradient(135deg,#085041,#1D9E75)':marca==='SYM'?'linear-gradient(135deg,#712B13,#D85A30)':'linear-gradient(135deg,#444,#888)';

  var h='<button class="btn btn-o" style="margin-bottom:10px;width:auto;padding:7px 14px;font-size:11px" onclick="avSelectedCode=null;render()">← Volver a la lista</button>';
  // Card moto
  h+='<div style="background:'+marcaBg+';border-radius:10px;padding:14px;color:#fff;margin-bottom:12px">';
  h+='<div class="flex fxc fxb" style="margin-bottom:8px">';
  h+='<div style="flex:1"><div style="font-size:11px;font-weight:600;opacity:.7;text-transform:uppercase;letter-spacing:1px">'+marca+'</div><div style="font-size:18px;font-weight:800;margin-top:2px">'+(motoData.linea||'')+' '+(motoData.referencia||'')+'</div></div>';
  h+='<div style="text-align:right"><div style="font-family:var(--fm);font-size:14px;font-weight:700;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:6px">'+code+'</div></div>';
  h+='</div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:6px;font-size:10px;opacity:.9">';
  if(motoData.cliente)h+='<span>👤 '+motoData.cliente+'</span>';
  if(motoData.asesor)h+='<span>· 💼 '+motoData.asesor+'</span>';
  if(motoData.color)h+='<span>· 🎨 '+motoData.color+'</span>';
  if(motoData.fecha_venta)h+='<span>· 📅 '+(motoData.fecha_venta||'').toString().split('T')[0]+'</span>';
  h+='</div>';
  h+='</div>';
  // Progress
  h+='<div class="card" style="padding:12px 14px;margin-bottom:10px">';
  h+='<div class="flex fxc fxb" style="margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.5px">Avance general</div><div style="font-size:22px;font-weight:800;color:'+pctColor+'">'+pct+'%</div></div>';
  h+='<div style="height:8px;background:var(--sf);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+pctColor+';border-radius:4px"></div></div>';
  h+='<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--tm)"><span>'+doneCount+' completadas</span><span>de '+TOTAL_TRAM+' actividades</span></div>';
  h+='</div>';

  // Lista de las 36 actividades
  h+='<div class="lbl">Detalle de actividades</div>';
  ACTIVIDADES_TRAM.forEach(function(act){
    var registro=ejecutadas[act.num];
    var isDone=!!registro;
    var bg=isDone?'#F7FBF2':'var(--sf)';
    var bd=isDone?'.5px solid #C0DD97':'.5px solid var(--bd)';
    h+='<div style="padding:8px 12px;background:'+bg+';border:'+bd+';border-radius:7px;margin-bottom:3px;display:flex;align-items:center;gap:10px">';
    h+='<div style="width:18px;height:18px;border-radius:50%;background:'+(isDone?'var(--gn)':'transparent')+';border:2px solid '+(isDone?'var(--gn)':'var(--bd2)')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:#fff;font-weight:700">'+(isDone?'✓':'')+'</div>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div style="display:flex;align-items:center;gap:6px"><span style="font-family:var(--fm);font-size:11px;font-weight:700;color:'+(isDone?'var(--gnd)':'var(--tm)')+';flex-shrink:0;min-width:32px">'+act.num+'</span><span style="font-size:11px;font-weight:'+(isDone?'600':'400')+';color:'+(isDone?'var(--tx)':'var(--tm)')+'">'+act.titulo+'</span></div>';
    if(isDone&&registro.responsable)h+='<div style="font-size:9px;color:var(--gn);margin-top:1px;padding-left:38px">'+registro.responsable+(registro.fecha_registro?' · '+registro.fecha_registro:'')+'</div>';
    h+='</div>';
    h+='</div>';
  });
  return h;
}

function avSync(){
  avLoading=true;avError='';render();
  var urlLista=getUrl('tramLista');
  var urlAvance=getUrl('tramAvance');
  if(!urlLista){avLoading=false;avError='Falta URL de TRAM_Consulta_Lista';render();return}
  if(!urlAvance){avLoading=false;avError='Falta URL de TRAM_Consulta_Avance';render();return}

  var ctrl=new AbortController();
  var to=setTimeout(function(){ctrl.abort()},20000);

  Promise.all([
    fetch(urlLista,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}',signal:ctrl.signal}).then(function(r){return r.json()}),
    fetch(urlAvance,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({codigo_barras:'*'}),signal:ctrl.signal}).then(function(r){return r.json()})
  ]).then(function(results){
    clearTimeout(to);
    avLoading=false;
    var motos=results[0].value||results[0]||[];
    var avances=results[1].value||results[1]||[];
    if(!Array.isArray(motos))motos=[];
    if(!Array.isArray(avances))avances=[];
    avMotos=motos;
    avAvances=avances;
    toast('✓ '+motos.length+' motos cargadas');
    render();
  }).catch(function(e){
    clearTimeout(to);
    avLoading=false;
    avError=e.name==='AbortError'?'Tiempo agotado al consultar':'Error: '+e.message;
    toast('Error al cargar avances',1);
    render();
  });
}
// ============= FIN PESTAÑA AVANCE =============
</script>
